<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGiotakos</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@600;900&family=Public+Sans:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #31c4de;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Public Sans', sans-serif;
        }

        .card-container {
            background-color: #fce136;
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            border: 4px solid #000000;
            box-shadow: 12px 12px 0px #000000;
            text-align: center;
        }

        /* Profile Section */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #000000;
            object-fit: cover;
            background-color: #fff;
        }

        h1 {
            font-family: 'Lexend Mega', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: #000000;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .bio {
            font-size: 0.95rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 35px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-btn {
            display: block;
            padding: 16px;
            color: #000000;
            text-decoration: none;
            font-family: 'Lexend Mega', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            border: 4px solid #000000;
            box-shadow: 0px 6px 0px #000000;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
            letter-spacing: -0.5px;
        }

        .link-btn:active {
            transform: translateY(6px);
            box-shadow: 0px 0px 0px #000000;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0px 8px 0px #000000;
        }
        
        .link-btn:hidden:active, .link-btn:hover:active {
            transform: translateY(6px);
            box-shadow: 0px 0px 0px #000000;
        }

        .btn-red { background-color: #ff5e6c; }
        .btn-blue { background-color: #49b6ff; }
        .btn-purple { background-color: #cb7aff; }
        .btn-orange { background-color: #ffaa3b; }
        .btn-green { background-color: #00ff75; }

    </style>
</head>
<body>

    <div class="card-container">
        <div class="avatar-container">
            <img src="https://github.com/kongiotakos.png" alt="Avatar" class="profile-img">
        </div>
        
        <h1>KONSTANTINOS GIOTAKOS</h1>
        <p class="bio">Computer Science student at AUTh</p>

        <div class="links-wrapper">
            <a href="https://www.instagram.com/kgiotakos/" class="link-btn btn-red" target="_blank">INSTAGRAM 📸</a>
            <a href="https://github.com/kongiotakos" class="link-btn btn-blue" target="_blank">GITHUB 🌐</a>
            <a href="https://www.youtube.com/watch?v=quxTnEEETbo" class="link-btn btn-purple" target="_blank">MUSIC 🎶</a>
            <a href="https://buymeacoffee.com/" class="link-btn btn-orange" target="_blank">BUY ME A COFFEE ☕</a>
            <a href="mailto:kgiotakos@gmail.com" class="link-btn btn-green">EMAIL 📫</a>
        </div>
    </div>

</body>
</html>
